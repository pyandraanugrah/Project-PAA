<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title> Map Dijkstra Airport Navigator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <span id="topbar-title">AIRPORT PATHFINDER — DIJKSTRA NAVIGATOR</span>
    <span>RAJA HAJI FISABILILLAH | TANJUNGPINANG</span>
  </div>

  <!-- MAP SECTION -->
  <div id="map-section">
    <div id="map-frame">
      <!-- Satellite image background -->
      <img id="map-img" src="img/bg.png"
           alt="Peta Bandara Raja Haji Fisabilillah"
           onerror="this.style.display='none'"/>

      <!-- Canvas for graph drawing -->
      <canvas id="map-canvas"></canvas>

      <!-- Person icon overlay (moves along the path) -->
     <!-- =========================
UPDATED index.html
HANYA GANTI/TAMBAH BAGIAN INI
========================= -->

<!-- GANTI SELURUH #person-icon LAMA MENJADI INI -->

<div id="person-icon" aria-label="Posisi kendaraan">
  <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

    <!-- Shadow -->
    <ellipse cx="32" cy="56" rx="14" ry="4"
             fill="rgba(0,200,240,0.25)"/>

    <!-- Car body -->
    <rect x="10" y="26"
          width="44"
          height="16"
          rx="6"
          fill="#00c8f0"/>

    <!-- Car top -->
    <rect x="18"
          y="18"
          width="28"
          height="12"
          rx="4"
          fill="#00a8cc"/>

    <!-- Windows -->
    <rect x="20"
          y="20"
          width="10"
          height="8"
          rx="2"
          fill="#cfefff"/>

    <rect x="34"
          y="20"
          width="10"
          height="8"
          rx="2"
          fill="#cfefff"/>

    <!-- Wheels -->
    <circle cx="20"
            cy="44"
            r="5"
            fill="#003344"/>

    <circle cx="44"
            cy="44"
            r="5"
            fill="#003344"/>

  </svg>

  <div id="person-arrow">▲</div>
</div>

      <!-- Status strip on map -->
      <div id="map-status">
        <div class="sdot" id="sdot"></div>
        <span id="stext">Pilih titik awal dan akhir, lalu klik ENTER.</span>
      </div>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div id="bottom-bar">

    <!-- LEFT: inputs -->
    <div id="bottom-left">
      <div class="input-row">
        <div class="pin-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="10" r="5" fill="#fff" stroke="#fff" stroke-width="1"/>
            <path d="M12 22 C12 22 5 14 5 10 a7 7 0 0 1 14 0 C19 14 12 22 12 22Z" fill="#fff"/>
            <circle cx="12" cy="10" r="2.5" fill="#061222"/>
          </svg>
        </div>
        <span class="input-label">TITIK AWAL</span>
        <div class="sel-wrap">
          <select class="node-select" id="sel-start">
            <option value="">--</option>
          </select>
        </div>
      </div>

      <div class="input-row">
        <div class="pin-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <line x1="5" y1="3" x2="5" y2="21" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <path d="M5 3 L18 7 L5 12 Z" fill="#fff"/>
          </svg>
        </div>
        <span class="input-label">TITIK AKHIR</span>
        <div class="sel-wrap">
          <select class="node-select" id="sel-end">
            <option value="">--</option>
          </select>
        </div>
      </div>

      <div class="rand-btns">
        <button class="rand-btn" id="btn-rs">RANDOM START</button>
        <button class="rand-btn" id="btn-re">RANDOM END</button>
      </div>
    </div>

    <!-- CENTER: controls -->
    <div id="bottom-center">
      <button id="btn-enter">ENTER</button>
      <div class="anim-btns">
        <button class="anim-btn" id="btn-start">START</button>
        <button class="anim-btn" id="btn-pause">PAUSE</button>
        <button class="anim-btn" id="btn-reset">RESET</button>
      </div>
      <div class="spd-row">
        SPEED
        <input type="range" id="spd" min="1" max="10" value="4"/>
        <span class="spd-val" id="spd-val">4x</span>
      </div>
    </div>

    <!-- RIGHT: results -->
    <div id="bottom-right">
      <div class="result-box">
        <div class="result-row">
          <span class="result-key">RUTE TERPENDEK :</span>
          <span class="result-val" id="res-route">—</span>
        </div>
        <div class="result-row">
          <span class="result-key">TOTAL JARAK :</span>
          <span class="result-val" id="res-total">—</span>
        </div>
      </div>
      <div class="travel-row">
        <span class="travel-lbl">DITEMPUH</span>
        <span class="travel-num" id="res-travel">0</span>
        <span class="travel-lbl">METER</span>
        <div class="prog-wrap">
          <div class="prog-bar" id="prog-bar"></div>
        </div>
      </div>
    </div>

  </div><!-- end bottom-bar -->

</div><!-- end app -->

<!-- TOOLTIP -->
<div id="tooltip">
  <div id="tt-id"></div>
  <div id="tt-name"></div>
  <div id="tt-tag"></div>
</div>

<script src="script.js"></script>
</body>
</html>
